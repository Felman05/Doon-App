<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Doon — CALABARZON Travel Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
/* ─── TOKENS ─────────────────────────────── */
:root{
  --i:#1a1a18;--i2:#3a3a36;--i3:#6b6b64;--i4:#9b9b92;
  --bd:#e4e4de;--bd2:#cecec6;
  --bg:#f8f7f4;--bg2:#f1f0ec;--bg3:#e8e7e1;
  --wh:#ffffff;
  --ac:#1a6b47;--ac2:#14543a;--ac3:#0e3d2b;
  --acb:#edf5f0;--acbd:#c4ddd2;
  --r:6px;--r2:10px;--r3:16px;
  --s1:0 1px 4px rgba(0,0,0,.07);
  --s2:0 4px 20px rgba(0,0,0,.09);
  --s3:0 12px 40px rgba(0,0,0,.12);
  --sb:220px; /* sidebar width */
}
/* ─── RESET ──────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--i);overflow-x:hidden;cursor:none}
a{text-decoration:none;color:inherit}
button,input,select,textarea{font-family:inherit;cursor:none}
img{display:block;max-width:100%}

/* ─── CURSOR ─────────────────────────────── */
#cur{position:fixed;top:-20px;left:-20px;z-index:9999;width:10px;height:10px;border-radius:50%;background:var(--ac);pointer-events:none;transform:translate(-50%,-50%);transition:width .2s,height .2s}
#curo{position:fixed;top:-20px;left:-20px;z-index:9998;width:30px;height:30px;border-radius:50%;border:1.5px solid var(--ac);pointer-events:none;transform:translate(-50%,-50%);opacity:.35;transition:width .3s,height .3s}
#cur.big{width:20px;height:20px}
#curo.big{width:48px;height:48px;opacity:.15}

/* ─── PAGE SYSTEM ────────────────────────── */
.pg{display:none}
.pg.on{display:block}

/* ─── NAVBAR (landing only) ──────────────── */
#nav{position:fixed;top:0;left:0;right:0;z-index:300;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 52px}
#nav.sc{background:rgba(248,247,244,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);box-shadow:var(--s1)}
.nlogo{font-family:'Fraunces',serif;font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--i)}
.nlogo b{color:var(--ac)}
.nctr{display:flex;gap:2px}
.nlnk{font-size:13px;color:var(--i3);padding:6px 14px;border-radius:100px;transition:color .12s,background .12s}
.nlnk:hover{color:var(--i);background:var(--bg2)}
.nrt{display:flex;gap:8px;align-items:center}
.nbtn-o{font-size:13px;font-weight:500;color:var(--i2);padding:7px 18px;border:1px solid var(--bd2);border-radius:100px;background:transparent;transition:all .12s}
.nbtn-o:hover{border-color:var(--i3);color:var(--i)}
.nbtn-s{font-size:13px;font-weight:600;color:var(--wh);padding:7px 20px;border:none;border-radius:100px;background:var(--i);transition:background .12s}
.nbtn-s:hover{background:var(--ac3)}

/* ─── HERO ───────────────────────────────── */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:110px 52px 80px;text-align:center;position:relative;overflow:hidden}
.hero-grain{position:absolute;inset:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.028'/%3E%3C/svg%3E")}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--ac);background:var(--acb);border:1px solid var(--acbd);border-radius:100px;padding:5px 14px 5px 8px;margin-bottom:28px;animation:fu .7s ease both;position:relative;z-index:1}
.hero-tag-dot{width:18px;height:18px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px}
.hero-h1{font-family:'Fraunces',serif;font-size:clamp(52px,8vw,100px);font-weight:300;line-height:.95;letter-spacing:-4px;color:var(--i);max-width:820px;margin-bottom:22px;animation:fu .8s .08s ease both;position:relative;z-index:1}
.hero-h1 em{font-style:italic;font-weight:700;color:var(--ac)}
.hero-sub{font-size:16px;font-weight:300;line-height:1.7;color:var(--i3);max-width:480px;margin-bottom:36px;animation:fu .8s .16s ease both;position:relative;z-index:1}
.hero-btns{display:flex;gap:10px;align-items:center;margin-bottom:48px;animation:fu .8s .24s ease both;position:relative;z-index:1}
.hbp{font-size:14px;font-weight:600;padding:12px 28px;border-radius:100px;border:none;background:var(--i);color:var(--wh);transition:background .15s,transform .12s}
.hbp:hover{background:var(--ac3);transform:translateY(-1px)}
.hbs{font-size:14px;font-weight:500;padding:12px 24px;border-radius:100px;border:1px solid var(--bd2);background:transparent;color:var(--i2);transition:all .12s}
.hbs:hover{border-color:var(--i3);color:var(--i)}
.hero-provs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;animation:fu .8s .32s ease both;position:relative;z-index:1}
.ptag{font-size:12px;color:var(--i3);padding:5px 14px;border-radius:100px;border:1px solid var(--bd);background:var(--wh);transition:all .12s}
.ptag:hover{border-color:var(--acbd);color:var(--ac);background:var(--acb)}
.scroll-hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--i4);z-index:1;animation:fu .8s .55s ease both}
.scline{width:1px;height:36px;background:linear-gradient(to bottom,var(--bd2),transparent);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ─── STATS STRIP ────────────────────────── */
.strip{border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);background:var(--wh);display:grid;grid-template-columns:repeat(4,1fr)}
.strip-item{padding:30px 36px;border-right:1px solid var(--bd);transition:background .15s}
.strip-item:last-child{border-right:none}
.strip-item:hover{background:var(--bg2)}
.strip-num{font-family:'Fraunces',serif;font-size:40px;font-weight:700;letter-spacing:-2px;color:var(--i);line-height:1;margin-bottom:4px}
.strip-lbl{font-size:13px;color:var(--i3);font-weight:400;line-height:1.4}

/* ─── SECTION SHARED ─────────────────────── */
.sec{max-width:1160px;margin:0 auto;padding:96px 52px}
.sec-tag{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--ac);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sec-tag::before{content:'';display:block;width:20px;height:1.5px;background:var(--ac)}
.sec-h2{font-family:'Fraunces',serif;font-size:clamp(34px,4vw,52px);font-weight:300;letter-spacing:-2px;line-height:1.05;color:var(--i);margin-bottom:14px}
.sec-h2 em{font-style:italic;font-weight:700}
.sec-p{font-size:16px;font-weight:300;color:var(--i3);line-height:1.7;max-width:500px;margin-bottom:52px}

/* ─── FEATURE GRID ───────────────────────── */
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden}
.feat-cell{background:var(--wh);padding:32px 28px;transition:background .15s;opacity:0;transform:translateY(18px)}
.feat-cell.in{animation:fu .55s ease forwards}
.feat-cell:hover{background:var(--bg)}
.feat-cell.wide{grid-column:span 2}
.feat-ico{width:38px;height:38px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:16px}
.feat-h{font-family:'Fraunces',serif;font-size:18px;font-weight:700;letter-spacing:-.4px;color:var(--i);margin-bottom:8px}
.feat-p{font-size:13px;font-weight:300;color:var(--i3);line-height:1.65}
.feat-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:14px}
.feat-tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:100px;border:1px solid var(--bd);color:var(--i3);background:var(--bg)}
.feat-big{font-family:'Fraunces',serif;font-size:60px;font-weight:700;letter-spacing:-3px;color:var(--ac);line-height:1}
.feat-big-lbl{font-size:12px;color:var(--i3);margin-top:4px}

/* ─── PROVINCES ──────────────────────────── */
.prov-sec{background:var(--i);padding:88px 52px;position:relative;overflow:hidden}
.prov-sec::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none}
.prov-inner{max-width:1160px;margin:0 auto;position:relative;z-index:1}
.prov-sec .sec-tag{color:rgba(255,255,255,.35)}
.prov-sec .sec-tag::before{background:rgba(255,255,255,.2)}
.prov-sec .sec-h2{color:var(--wh)}
.prov-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--r3);overflow:hidden;margin-top:48px}
.prov-card{background:rgba(255,255,255,.03);padding:28px 20px;text-align:center;transition:background .15s;cursor:pointer}
.prov-card:hover{background:rgba(255,255,255,.08)}
.prov-emo{font-size:30px;margin-bottom:12px;display:block}
.prov-name{font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:rgba(255,255,255,.9);margin-bottom:4px;letter-spacing:-.3px}
.prov-n{font-size:11px;color:rgba(255,255,255,.3)}
.prov-bar{width:24px;height:2px;border-radius:2px;background:var(--ac);margin:12px auto 0;opacity:.6}

/* ─── HOW IT WORKS ───────────────────────── */
.steps-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:48px;border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden;background:var(--bd)}
.step-cell{background:var(--wh);padding:32px 28px;border-right:1px solid var(--bd);transition:background .15s;opacity:0;transform:translateY(14px)}
.step-cell.in{animation:fu .5s ease forwards}
.step-cell:last-child{border-right:none}
.step-cell:hover{background:var(--bg)}
.step-n{font-family:'Fraunces',serif;font-size:34px;font-weight:700;color:var(--bd2);line-height:1;margin-bottom:14px;letter-spacing:-1px}
.step-h{font-size:15px;font-weight:600;color:var(--i);margin-bottom:8px}
.step-p{font-size:13px;font-weight:300;color:var(--i3);line-height:1.6}

/* ─── USER ROLES ─────────────────────────── */
.roles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px}
.role-card{border:1px solid var(--bd);border-radius:var(--r3);padding:36px 30px;background:var(--wh);transition:border-color .2s,box-shadow .2s,transform .2s;opacity:0;transform:translateY(18px)}
.role-card.in{animation:fu .55s ease forwards}
.role-card:hover{border-color:var(--bd2);box-shadow:var(--s2);transform:translateY(-3px)}
.role-card.dark{background:var(--i);border-color:var(--i)}
.role-ico{font-size:26px;margin-bottom:16px}
.role-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--i);margin-bottom:6px}
.role-desc{font-size:13px;font-weight:300;color:var(--i3);line-height:1.65;margin-bottom:20px}
.role-list{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:24px}
.role-list li{font-size:13px;color:var(--i2);display:flex;align-items:flex-start;gap:8px}
.role-list li::before{content:'–';color:var(--i4);flex-shrink:0}
.role-btn{font-size:13px;font-weight:600;padding:9px 20px;border-radius:100px;border:1px solid var(--bd2);background:transparent;color:var(--i2);transition:all .12s}
.role-btn:hover{background:var(--i);color:var(--wh);border-color:var(--i)}
.role-card.dark .role-title{color:var(--wh)}
.role-card.dark .role-desc{color:rgba(255,255,255,.45)}
.role-card.dark .role-list li{color:rgba(255,255,255,.7)}
.role-card.dark .role-list li::before{color:var(--ac)}
.role-card.dark .role-btn{background:var(--ac);color:var(--wh);border-color:var(--ac)}
.role-card.dark .role-btn:hover{background:var(--ac2);border-color:var(--ac2)}

/* ─── FOOTER ─────────────────────────────── */
footer{border-top:1px solid var(--bd);background:var(--wh);padding:52px 52px 36px}
.footer-inner{max-width:1160px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid var(--bd)}
.footer-brand{font-family:'Fraunces',serif;font-size:20px;font-weight:700;letter-spacing:-.5px;color:var(--i);margin-bottom:8px}
.footer-brand b{color:var(--ac)}
.footer-sub{font-size:12px;color:var(--i4);line-height:1.6;max-width:200px}
.footer-col h6{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--i3);margin-bottom:14px}
.footer-col a{display:block;font-size:13px;color:var(--i3);margin-bottom:8px;transition:color .12s}
.footer-col a:hover{color:var(--i)}
.footer-bottom{display:flex;justify-content:space-between;align-items:center}
.footer-copy{font-size:12px;color:var(--i4)}
.footer-uni{font-size:11px;color:var(--i4);font-style:italic}

/* ─── AUTH PAGES ─────────────────────────── */
.auth-wrap{min-height:100vh;display:flex;align-items:stretch}
.auth-left{flex:1;background:var(--i);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 48px;position:relative;overflow:hidden}
.auth-left::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.05'/%3E%3C/svg%3E");pointer-events:none}
.auth-left-inner{position:relative;z-index:1;max-width:380px;width:100%}
.auth-logo{font-family:'Fraunces',serif;font-size:28px;font-weight:700;letter-spacing:-.8px;color:var(--wh);margin-bottom:40px}
.auth-logo b{color:var(--ac)}
.auth-tagline{font-family:'Fraunces',serif;font-size:36px;font-weight:300;line-height:1.1;letter-spacing:-1.5px;color:var(--wh)}
.auth-tagline em{font-style:italic;font-weight:700;color:var(--ac)}
.auth-sub-txt{font-size:14px;font-weight:300;color:rgba(255,255,255,.45);line-height:1.65;margin-bottom:36px}
.auth-provs{display:flex;flex-wrap:wrap;gap:6px}
.auth-prov{font-size:11px;color:rgba(255,255,255,.4);padding:4px 12px;border-radius:100px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04)}
.auth-right{width:520px;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:52px 52px}
.auth-form-box{width:100%;max-width:380px}
.auth-form-title{font-family:'Fraunces',serif;font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--i);margin-bottom:6px}
.auth-form-sub{font-size:13px;font-weight:300;color:var(--i3);margin-bottom:32px}
.auth-form-sub a{color:var(--ac);font-weight:500}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--i4);margin-bottom:6px;display:block}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--bd2);border-radius:var(--r2);font-size:14px;color:var(--i);background:var(--wh);outline:none;transition:border-color .15s,box-shadow .15s}
.form-input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(26,107,71,.1)}
.form-input::placeholder{color:var(--i4)}
.form-select{appearance:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.form-divider span{font-size:12px;color:var(--i4)}
.form-divider::before,.form-divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.btn-full{width:100%;padding:12px;border-radius:var(--r2);border:none;font-size:14px;font-weight:600;cursor:none;transition:all .15s}
.btn-primary{background:var(--i);color:var(--wh)}
.btn-primary:hover{background:var(--ac3)}
.btn-outline{background:transparent;color:var(--i2);border:1.5px solid var(--bd2)}
.btn-outline:hover{border-color:var(--i3);color:var(--i)}
.auth-footer-txt{font-size:12px;color:var(--i4);text-align:center;margin-top:20px}
.auth-footer-txt a{color:var(--ac);font-weight:500}
.role-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.role-opt{border:1.5px solid var(--bd2);border-radius:var(--r2);padding:14px 10px;text-align:center;cursor:none;transition:all .15s}
.role-opt:hover{border-color:var(--bd);background:var(--bg2)}
.role-opt.selected{border-color:var(--ac);background:var(--acb)}
.role-opt-ico{font-size:22px;margin-bottom:6px;display:block}
.role-opt-lbl{font-size:12px;font-weight:600;color:var(--i2)}
.role-opt.selected .role-opt-lbl{color:var(--ac2)}
.consent-box{display:flex;align-items:flex-start;gap:10px;margin-bottom:20px;padding:12px 14px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--bd)}
.consent-box input[type=checkbox]{width:16px;height:16px;margin-top:2px;accent-color:var(--ac);flex-shrink:0}
.consent-txt{font-size:12px;color:var(--i3);line-height:1.55}
.consent-txt a{color:var(--ac)}
.forgot-link{font-size:12px;color:var(--ac);font-weight:500;float:right;margin-top:-10px;margin-bottom:16px}
.auth-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--i3);margin-bottom:28px;transition:color .12s}
.auth-back:hover{color:var(--i)}

/* ─── DASHBOARD LAYOUT ───────────────────── */
.d-wrap{display:flex;min-height:100vh;background:var(--bg)}
.d-sidebar{width:var(--sb);flex-shrink:0;background:var(--wh);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:100}
.d-main{margin-left:var(--sb);flex:1;min-width:0;padding:28px 32px;overflow-x:hidden}

/* sidebar pieces */
.sb-logo{padding:18px 20px 16px;border-bottom:1px solid var(--bd);font-family:'Fraunces',serif;font-size:19px;font-weight:700;letter-spacing:-.4px;color:var(--i)}
.sb-logo b{color:var(--ac)}
.sb-logo sub{font-size:9px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--i4);font-family:'DM Sans',sans-serif;vertical-align:super;margin-left:3px}
.sb-user{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sb-ava{width:36px;height:36px;border-radius:50%;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sb-name{font-size:13px;font-weight:600;color:var(--i)}
.sb-role{font-size:11px;color:var(--i4);margin-top:1px}
.sb-nav{flex:1;padding:10px 10px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.sb-section{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--i4);padding:10px 10px 4px;margin-top:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);font-size:13px;font-weight:400;color:var(--i3);cursor:pointer;transition:background .1s,color .1s;white-space:nowrap}
.sb-item:hover{background:var(--bg2);color:var(--i)}
.sb-item.active{background:var(--acb);color:var(--ac2);font-weight:600}
.sb-ico{width:18px;text-align:center;font-size:13px;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:100px;background:var(--i);color:var(--wh);display:flex;align-items:center;justify-content:center;padding:0 4px}
.sb-foot{padding:14px 16px;border-top:1px solid var(--bd);font-size:11px;color:var(--i4)}

/* dashboard topbar */
.d-topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.d-page-title{font-family:'Fraunces',serif;font-size:24px;font-weight:700;letter-spacing:-1px;color:var(--i)}
.d-page-sub{font-size:13px;color:var(--i4);margin-top:2px;font-weight:300}
.d-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.d-ico-btn{width:34px;height:34px;background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;position:relative;transition:border-color .12s}
.d-ico-btn:hover{border-color:var(--bd2)}
.notif-dot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--ac);border:1.5px solid var(--wh)}
.d-ava-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer}

/* ─── KPI CARDS ──────────────────────────── */
.kpi-row{display:grid;gap:12px;margin-bottom:20px}
.kpi-row.c4{grid-template-columns:repeat(4,1fr)}
.kpi-row.c3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r2);padding:18px 20px;transition:box-shadow .12s;animation:fu .4s ease both}
.kpi:hover{box-shadow:var(--s1)}
.kpi-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--i4);margin-bottom:8px}
.kpi-val{font-family:'Fraunces',serif;font-size:30px;font-weight:700;letter-spacing:-1px;color:var(--i);line-height:1}
.kpi-sub{font-size:11px;color:var(--i4);margin-top:5px}
.kpi-up{color:var(--ac)}
.kpi-warn{color:#9b6b00}

/* ─── DASH CARD ──────────────────────────── */
.dc{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r2);padding:20px 22px;animation:fu .45s ease both}
.dc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.dc-title{font-size:14px;font-weight:600;color:var(--i);letter-spacing:-.2px}
.dc-sub{font-size:11px;color:var(--i4);margin-top:2px}

/* ─── GRID UTILS ─────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g31{display:grid;grid-template-columns:3fr 2fr;gap:16px}
.g13{display:grid;grid-template-columns:2fr 3fr;gap:16px}
.mb16{margin-bottom:16px}
.mb20{margin-bottom:20px}
.col-stack{display:flex;flex-direction:column;gap:16px}

/* ─── SMALL BTNS ─────────────────────────── */
.s-btn{font-size:12px;font-weight:500;padding:5px 12px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--i3);transition:all .1s;white-space:nowrap}
.s-btn:hover{border-color:var(--i3);color:var(--i)}
.s-btn.dark{background:var(--i);color:var(--wh);border-color:var(--i)}
.s-btn.dark:hover{background:var(--ac3);border-color:var(--ac3)}
.s-btn.green{background:var(--ac);color:var(--wh);border-color:var(--ac)}
.s-btn.green:hover{background:var(--ac2)}

/* ─── PILLS ──────────────────────────────── */
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:100px}
.p-g{background:var(--acb);color:var(--ac2);border:1px solid var(--acbd)}
.p-y{background:#fef9e7;color:#8a5c00;border:1px solid #e8cc70}
.p-r{background:#fef0ee;color:#8a2a1a;border:1px solid #f0b8b0}
.p-n{background:var(--bg2);color:var(--i3);border:1px solid var(--bd)}

/* ─── WEATHER ────────────────────────────── */
.wx-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.wx-cell{background:var(--wh);padding:14px 12px;text-align:center;transition:background .12s}
.wx-cell:hover{background:var(--bg)}
.wx-ico{font-size:20px;margin-bottom:6px;display:block}
.wx-temp{font-family:'Fraunces',serif;font-size:22px;font-weight:700;letter-spacing:-1px;color:var(--i)}
.wx-loc{font-size:11px;color:var(--i4);margin-top:2px}
.wx-cond{font-size:10px;color:var(--i4);margin-top:1px}

/* ─── REC FORM ───────────────────────────── */
.rec-form{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr auto;gap:10px;align-items:end}
.rf-g{display:flex;flex-direction:column;gap:4px}
.rf-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--i4)}
.rf-ctrl{padding:8px 11px;border:1.5px solid var(--bd2);border-radius:var(--r);font-size:13px;color:var(--i);background:var(--bg);outline:none;width:100%;appearance:none;transition:border-color .12s,background .12s}
.rf-ctrl:focus{border-color:var(--ac2);background:var(--wh)}
.rf-go{padding:8px 20px;border-radius:var(--r);border:none;background:var(--i);color:var(--wh);font-size:13px;font-weight:600;transition:background .12s;white-space:nowrap}
.rf-go:hover{background:var(--ac3)}

/* ─── DEST LIST ──────────────────────────── */
.dest-list{display:flex;flex-direction:column;gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.dest-row{background:var(--wh);padding:12px 16px;display:flex;align-items:center;gap:13px;transition:background .1s}
.dest-row:hover{background:var(--bg)}
.dest-ico{width:44px;height:44px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.dest-name{font-size:13px;font-weight:600;color:var(--i)}
.dest-meta{font-size:11px;color:var(--i4);margin-top:2px}
.dest-rating{font-size:12px;font-weight:600;color:var(--i2);margin-left:auto;white-space:nowrap;flex-shrink:0}

/* ─── MAP BOX ────────────────────────────── */
.map-box{background:var(--bg2);border:1px dashed var(--bd2);border-radius:var(--r2);height:160px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--i3);font-size:12px}
.map-pins{display:flex;gap:18px;margin-bottom:4px}
.m-pin{width:9px;height:9px;border-radius:50%;background:var(--ac);animation:pin-pulse 2.5s ease infinite}
.m-pin:nth-child(2){animation-delay:-.9s}
.m-pin:nth-child(3){animation-delay:-1.7s;background:var(--i3)}
@keyframes pin-pulse{0%,100%{box-shadow:0 0 0 3px rgba(26,107,71,.2)}50%{box-shadow:0 0 0 9px rgba(26,107,71,0)}}

/* ─── ITINERARY ──────────────────────────── */
.itin{display:flex;flex-direction:column}
.itin-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--bd)}
.itin-row:last-child{border-bottom:none}
.itin-day{font-size:10px;font-weight:700;letter-spacing:.3px;padding:3px 7px;border-radius:4px;background:var(--i);color:var(--wh);flex-shrink:0;margin-top:1px}
.itin-name{font-size:13px;font-weight:600;color:var(--i)}
.itin-meta{font-size:11px;color:var(--i4);margin-top:2px}
.itin-total{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.itin-total-lbl{font-size:11px;color:var(--i4)}
.itin-total-val{font-family:'Fraunces',serif;font-size:18px;font-weight:700;letter-spacing:-.5px}

/* ─── CHATBOT ────────────────────────────── */
.chat-wrap{display:flex;flex-direction:column;height:290px}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:8px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.chat-row{display:flex;align-items:flex-end;gap:7px}
.chat-row.u{flex-direction:row-reverse}
.chat-bub{max-width:80%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.55}
.chat-row.b .chat-bub{background:var(--bg2);border:1px solid var(--bd);color:var(--i);border-bottom-left-radius:3px}
.chat-row.u .chat-bub{background:var(--i);color:var(--wh);border-bottom-right-radius:3px}
.chat-ava{width:26px;height:26px;border-radius:50%;background:var(--acb);border:1px solid var(--acbd);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.chat-bar{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--bd)}
.chat-in{flex:1;padding:8px 13px;border:1.5px solid var(--bd2);border-radius:100px;font-size:13px;color:var(--i);background:var(--bg);outline:none;transition:border-color .12s}
.chat-in:focus{border-color:var(--i3);background:var(--wh)}
.chat-snd{padding:8px 18px;border-radius:100px;border:none;background:var(--i);color:var(--wh);font-size:13px;font-weight:600;transition:background .12s}
.chat-snd:hover{background:var(--ac3)}

/* ─── PACKING ────────────────────────────── */
.pack-row{display:flex;flex-wrap:wrap;gap:6px}
.pack-chip{font-size:12px;padding:4px 12px;border-radius:100px;border:1px solid var(--bd);color:var(--i2);transition:all .1s}
.pack-chip:hover{border-color:var(--i3);background:var(--bg2)}
.pack-chip.ess{background:var(--acb);border-color:var(--acbd);color:var(--ac2)}
.sub-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--i4);margin-bottom:8px}

/* ─── BARS ───────────────────────────────── */
.bar-list{display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-lbl{font-size:12px;color:var(--i3);min-width:70px;text-align:right;flex-shrink:0}
.bar-bg{flex:1;background:var(--bg2);border-radius:3px;height:8px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;background:var(--i2);transition:width 1.1s ease}
.bar-f.ac{background:var(--ac)}
.bar-val{font-size:12px;font-weight:600;color:var(--i);min-width:36px}

/* ─── TABLE ──────────────────────────────── */
.d-table{width:100%;border-collapse:collapse}
.d-table th{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--i4);padding:8px 10px;border-bottom:2px solid var(--bd);text-align:left;background:var(--bg)}
.d-table td{padding:11px 10px;font-size:13px;border-bottom:1px solid var(--bd);vertical-align:middle}
.d-table tr:last-child td{border-bottom:none}
.d-table tr:hover td{background:var(--bg)}

/* ─── LISTING / REVIEW / APPROVAL ───────── */
.list-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r);background:var(--bg);border:1px solid var(--bd);margin-bottom:8px;transition:border-color .1s}
.list-item:last-child{margin-bottom:0}
.list-item:hover{border-color:var(--bd2)}
.list-ico{width:40px;height:40px;border-radius:var(--r);background:var(--wh);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.list-name{font-size:13px;font-weight:600;color:var(--i)}
.list-meta{font-size:11px;color:var(--i4);margin-top:1px}
.rev-item{padding:12px 14px;border-radius:var(--r);background:var(--bg);border:1px solid var(--bd);margin-bottom:8px}
.rev-item:last-child{margin-bottom:0}
.rev-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.rev-ava{width:28px;height:28px;border-radius:50%;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.rev-name{font-size:13px;font-weight:600;color:var(--i)}
.rev-date{font-size:11px;color:var(--i4)}
.rev-stars{margin-left:auto;font-size:12px;color:var(--i2);letter-spacing:1px}
.rev-txt{font-size:12px;color:var(--i3);line-height:1.55;font-weight:300}
.appr-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:var(--r);background:var(--bg);border:1px solid var(--bd);border-left:3px solid var(--bd2);margin-bottom:8px;transition:background .1s}
.appr-item:last-child{margin-bottom:0}
.appr-item:hover{background:var(--bg2)}
.appr-name{font-size:13px;font-weight:600;color:var(--i)}
.appr-meta{font-size:11px;color:var(--i4);margin-top:1px}
.appr-btns{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
.btn-ok{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r);background:var(--acb);border:1px solid var(--acbd);color:var(--ac2);transition:all .1s}
.btn-ok:hover{background:var(--ac);color:var(--wh);border-color:var(--ac)}
.btn-no{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r);background:#fef0ee;border:1px solid #f0b8b0;color:#8a2a1a;transition:all .1s}
.btn-no:hover{background:#8a2a1a;color:var(--wh);border-color:#8a2a1a}

/* ─── ALERT BANNERS ──────────────────────── */
.alert{font-size:12px;padding:9px 12px;border-radius:var(--r);border-left:3px solid;margin-bottom:7px;font-weight:500}
.alert:last-child{margin-bottom:0}
.alert.warn{background:var(--bg2);border-color:#c0a030;color:var(--i2)}
.alert.err{background:var(--bg2);border-color:#c05040;color:var(--i2)}
.alert.info{background:var(--bg2);border-color:var(--bd2);color:var(--i2)}
.alert.ok{background:var(--acb);border-color:var(--ac);color:var(--ac2)}

/* ─── MISC ───────────────────────────────── */
.divider{height:1px;background:var(--bd);margin:14px 0}

/* ─── SCROLL REVEAL ──────────────────────── */
.sr{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.sr.in{opacity:1;transform:translateY(0)}
.sr.d1{transition-delay:.08s}.sr.d2{transition-delay:.16s}.sr.d3{transition-delay:.24s}.sr.d4{transition-delay:.32s}

/* ─── KEYFRAMES ──────────────────────────── */
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
